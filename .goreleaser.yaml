version: 2

builds:
  - main: ./cmd/engram
    binary: engram
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - name: engram
    repository:
      owner: shiblon
      name: homebrew-engram
    homepage: "https://github.com/shiblon/engram"
    description: "Auto-memory system for AI coding agents"
    license: "Apache-2.0"
    install: |-
      bin.install "engram"
    test: |-
      system bin/"engram", "--version"

release:
  github:
    owner: shiblon
    name: engram
